<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Mantenimiento Industrial</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #0f1117; --bg2: #161b27; --bg3: #1e2535; --border: #2a3045;
    --accent: #e8c840; --text: #e8eaf0; --text2: #8892a4; --text3: #4a5568;
    --alta: #ef4444; --alta-bg: #2d1414; --media: #f59e0b; --media-bg: #2d2010;
    --baja: #22c55e; --baja-bg: #102d17;
    --font: 'IBM Plex Sans', sans-serif; --mono: 'IBM Plex Mono', monospace; --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; min-height: 100vh; }
  .app { display: flex; min-height: 100vh; }
  .sidebar { width: 220px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; }
  .main { margin-left: 220px; flex: 1; padding: 2rem; min-height: 100vh; }
  .sidebar-logo { padding: 1.5rem 1.25rem 1rem; border-bottom: 1px solid var(--border); }
  .sidebar-logo-text { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; }
  .sidebar-logo-sub { font-size: 12px; color: var(--text2); margin-top: 4px; }
  .sidebar-nav { padding: 1rem 0; flex: 1; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 1.25rem; cursor: pointer; color: var(--text2); font-size: 13px; border-left: 3px solid transparent; transition: all 0.15s; }
  .nav-item:hover { color: var(--text); background: var(--bg3); }
  .nav-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(232,200,64,0.05); }
  .nav-icon { width: 16px; height: 16px; opacity: 0.7; flex-shrink: 0; }
  .nav-item.active .nav-icon { opacity: 1; }
  .sidebar-footer { padding: 1rem 1.25rem; border-top: 1px solid var(--border); }
  .sync-btn { width: 100%; padding: 8px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text2); font-size: 12px; cursor: pointer; font-family: var(--mono); transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .sync-btn:hover { border-color: var(--accent); color: var(--accent); }
  .sync-status { font-size: 11px; color: var(--text3); text-align: center; margin-top: 6px; font-family: var(--mono); }
  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
  .page-title { font-size: 20px; font-weight: 500; }
  .page-sub { font-size: 12px; color: var(--text2); margin-top: 3px; font-family: var(--mono); }
  .header-actions { display: flex; gap: 8px; }
  .btn-primary { padding: 8px 16px; background: var(--accent); color: #0f1117; border: none; border-radius: var(--radius); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .btn-primary:hover { background: #f0d060; }
  .btn-secondary { padding: 8px 16px; background: transparent; color: var(--text2); border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; cursor: pointer; transition: all 0.15s; }
  .btn-secondary:hover { border-color: var(--text2); color: var(--text); }
  .section { display: none; }
  .section.active { display: block; }
  .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 2rem; }
  .metric-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; }
  .metric-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.1em; font-family: var(--mono); margin-bottom: 8px; }
  .metric-value { font-size: 32px; font-weight: 300; line-height: 1; }
  .metric-accent { color: var(--accent); }
  .metric-sub { font-size: 11px; color: var(--text3); margin-top: 6px; }
  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 2rem; }
  .chart-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; }
  .chart-title { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.1em; font-family: var(--mono); margin-bottom: 1rem; }
  .legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .bar-label { width: 60px; font-size: 12px; color: var(--text2); font-family: var(--mono); flex-shrink: 0; }
  .bar-track { flex: 1; background: var(--bg3); border-radius: 20px; height: 6px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 20px; transition: width 0.8s ease; }
  .bar-pct { width: 36px; text-align: right; font-size: 12px; color: var(--text); font-family: var(--mono); flex-shrink: 0; }
  .bar-count { width: 20px; text-align: right; font-size: 11px; color: var(--text3); font-family: var(--mono); flex-shrink: 0; }
  .table-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .table-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 10px; }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .filters select { font-size: 12px; padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg3); color: var(--text2); font-family: var(--mono); cursor: pointer; }
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 700px; }
  th { text-align: left; padding: 10px 14px; font-size: 11px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; border-bottom: 1px solid var(--border); background: var(--bg3); font-weight: 400; }
  td { padding: 11px 14px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .id-cell { font-family: var(--mono); font-size: 12px; color: var(--text3); }
  .date-cell { font-family: var(--mono); font-size: 12px; color: var(--text2); white-space: nowrap; }
  .desc-cell { max-width: 280px; }
  .obs-cell { font-size: 12px; color: var(--text2); max-width: 200px; }
  .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; white-space: nowrap; font-family: var(--mono); }
  .badge-alta { background: var(--alta-bg); color: var(--alta); }
  .badge-media { background: var(--media-bg); color: var(--media); }
  .badge-baja { background: var(--baja-bg); color: var(--baja); }
  .badge-pendiente { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
  .badge-encurso { background: rgba(59,130,246,0.1); color: #3b82f6; }
  .badge-esperando { background: var(--media-bg); color: var(--media); }
  .badge-finalizada { background: var(--baja-bg); color: var(--baja); }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: none; align-items: center; justify-content: center; padding: 1rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; width: 100%; max-width: 520px; }
  .modal-title { font-size: 16px; font-weight: 500; margin-bottom: 1.5rem; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; font-family: var(--mono); }
  .form-input, .form-select, .form-textarea { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; color: var(--text); font-size: 13px; font-family: var(--font); width: 100%; }
  .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--accent); }
  .form-textarea { resize: vertical; min-height: 70px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 1.5rem; }
  .loading { display: flex; align-items: center; justify-content: center; padding: 4rem; color: var(--text2); font-family: var(--mono); font-size: 13px; gap: 10px; }
  .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 3rem; color: var(--text3); font-family: var(--mono); font-size: 13px; }
  .error-msg { background: var(--alta-bg); border: 1px solid var(--alta); border-radius: var(--radius); padding: 1rem; color: var(--alta); font-size: 13px; margin-bottom: 1rem; font-family: var(--mono); }
  @media (max-width: 768px) {
    .sidebar { width: 100%; height: auto; position: relative; }
    .main { margin-left: 0; padding: 1rem; }
    .charts-grid { grid-template-columns: 1fr; }
    .sidebar-nav { display: flex; flex-direction: row; padding: 0; overflow-x: auto; }
    .sidebar-footer { display: none; }
    .app { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-text">MANT // IND</div>
      <div class="sidebar-logo-sub">Grupo Industrial</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item active" onclick="switchSection('dashboard', this)">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
        Dashboard
      </div>
      <div class="nav-item" onclick="switchSection('tareas', this)">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M2 8h8M2 12h10"/></svg>
        Tareas
      </div>
    </nav>
    <div class="sidebar-footer">
      <button class="sync-btn" onclick="loadData()">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 8a7 7 0 1 0 7-7"/><path d="M1 1v4h4"/></svg>
        Sincronizar
      </button>
      <div class="sync-status" id="syncStatus">—</div>
    </div>
  </aside>
  <main class="main">
    <section id="sec-dashboard" class="section active">
      <div class="page-header">
        <div>
          <div class="page-title">Dashboard</div>
          <div class="page-sub" id="dashSub">Cargando datos...</div>
        </div>
        <div class="header-actions">
          <button class="btn-secondary" onclick="loadData()">↺ Actualizar</button>
          <button class="btn-primary" onclick="openModal()">+ Nueva tarea</button>
        </div>
      </div>
      <div id="dashContent"><div class="loading"><div class="spinner"></div>Conectando...</div></div>
    </section>
    <section id="sec-tareas" class="section">
      <div class="page-header">
        <div>
          <div class="page-title">Listado de tareas</div>
          <div class="page-sub">Gestión completa de órdenes de trabajo</div>
        </div>
        <div class="header-actions">
          <button class="btn-secondary" onclick="loadData()">↺ Actualizar</button>
          <button class="btn-primary" onclick="openModal()">+ Nueva tarea</button>
        </div>
      </div>
      <div id="errorMsg"></div>
      <div class="table-wrap">
        <div class="table-toolbar">
          <div class="filters">
            <select id="filtroPlanta" onchange="renderTable()"><option value="">Todas las plantas</option></select>
            <select id="filtroPrioridad" onchange="renderTable()"><option value="">Toda prioridad</option><option>Alta</option><option>Media</option><option>Baja</option></select>
            <select id="filtroEstado" onchange="renderTable()"><option value="">Todos los estados</option><option>Pendiente</option><option>En curso</option><option>Esperando materiales</option><option>Finalizada</option></select>
          </div>
          <span id="tableCount" style="font-size:12px;color:var(--text3);font-family:var(--mono);"></span>
        </div>
        <div class="table-scroll">
          <table>
            <thead><tr><th>ID</th><th>Fecha</th><th>Planta</th><th>Equipo</th><th>Descripción</th><th>Prioridad</th><th>Estado</th><th>Observaciones</th></tr></thead>
            <tbody id="tbody"><tr><td colspan="8"><div class="loading"><div class="spinner"></div>Cargando...</div></td></tr></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>
</div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">Nueva tarea</div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Fecha</label><input type="date" class="form-input" id="fFecha"></div>
      <div class="form-group"><label class="form-label">Planta</label><input type="text" class="form-input" id="fPlanta" placeholder="Ej: Molino Harinero"></div>
      <div class="form-group full"><label class="form-label">Equipo</label><input type="text" class="form-input" id="fEquipo" placeholder="Ej: Elevador N°3"></div>
      <div class="form-group full"><label class="form-label">Descripción</label><textarea class="form-textarea" id="fDesc" placeholder="Describí la tarea a realizar..."></textarea></div>
      <div class="form-group"><label class="form-label">Prioridad</label><select class="form-select" id="fPrioridad"><option>Alta</option><option selected>Media</option><option>Baja</option></select></div>
      <div class="form-group"><label class="form-label">Estado</label><select class="form-select" id="fEstado"><option selected>Pendiente</option><option>En curso</option><option>Esperando materiales</option><option>Finalizada</option></select></div>
      <div class="form-group full"><label class="form-label">Observaciones</label><input type="text" class="form-input" id="fObs" placeholder="Opcional"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="guardarTarea()" id="btnGuardar">Guardar tarea</button>
    </div>
  </div>
</div>
<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxbvJqyh9nxBR_8oRZfbVe6gXZOvLAIewXID6KO3xrIPwfL3cbb6xt8-_JfH8LFFoEalA/exec';
let tareas = [];
let chartPrio = null, chartEst = null;

async function readSheet() {
  const res = await fetch(API_URL + '?action=read');
  const data = await res.json();
  if (!data.ok) throw new Error(data.error);
  return data.data;
}

async function appendRow(row) {
  const res = await fetch(API_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'append', row })
  });
  const data = await res.json();
  if (!data.ok) throw new Error(data.error);
}

async function loadData() {
  document.getElementById('syncStatus').textContent = 'Sincronizando...';
  try {
    const rows = await readSheet();
    tareas = rows.length <= 1 ? [] : rows.slice(1).map(r => ({
      id: r[0]||'', fecha: r[1]||'', planta: r[2]||'', equipo: r[3]||'',
      desc: r[4]||'', prioridad: r[5]||'', estado: r[6]||'', obs: r[7]||''
    })).filter(t => t.id);
    const now = new Date().toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' });
    document.getElementById('syncStatus').textContent = 'Sync: ' + now;
    document.getElementById('dashSub').textContent = tareas.length + ' tareas · ' + now;
    renderDashboard();
    renderTable();
    initFiltros();
    showError('');
  } catch(e) {
    document.getElementById('syncStatus').textContent = 'Error';
    showError('Error de conexión: ' + e.message);
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  if (el) el.innerHTML = msg ? `<div class="error-msg">${msg}</div>` : '';
}

function renderDashboard() {
  const total = tareas.length;
  const alta = tareas.filter(t => t.prioridad==='Alta').length;
  const media = tareas.filter(t => t.prioridad==='Media').length;
  const baja = tareas.filter(t => t.prioridad==='Baja').length;
  const activas = tareas.filter(t => ['Pendiente','En curso'].includes(t.estado)).length;
  const esperando = tareas.filter(t => t.estado==='Esperando materiales').length;
  const finalizadas = tareas.filter(t => t.estado==='Finalizada').length;
  const pA = total ? Math.round(alta/total*100) : 0;
  const pM = total ? Math.round(media/total*100) : 0;
  const pB = total ? Math.round(baja/total*100) : 0;
  document.getElementById('dashContent').innerHTML = `
    <div class="metric-grid">
      <div class="metric-card"><div class="metric-label">Total tareas</div><div class="metric-value">${total}</div><div class="metric-sub">en el sistema</div></div>
      <div class="metric-card"><div class="metric-label">Críticas (Alta)</div><div class="metric-value metric-accent">${alta}</div><div class="metric-sub">${pA}% del total</div></div>
      <div class="metric-card"><div class="metric-label">Activas</div><div class="metric-value">${activas}</div><div class="metric-sub">pendiente o en curso</div></div>
      <div class="metric-card"><div class="metric-label">Esp. materiales</div><div class="metric-value">${esperando}</div><div class="metric-sub">aguardando repuestos</div></div>
      <div class="metric-card"><div class="metric-label">Finalizadas</div><div class="metric-value">${finalizadas}</div><div class="metric-sub">completadas</div></div>
    </div>
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">Por prioridad</div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>Alta ${pA}%</div>
          <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>Media ${pM}%</div>
          <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div>Baja ${pB}%</div>
        </div>
        <div style="position:relative;height:180px;"><canvas id="chartPrio" role="img" aria-label="Tareas por prioridad"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Por estado</div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:#8892a4"></div>Pendiente</div>
          <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>En curso</div>
          <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>Esp. mat.</div>
          <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div>Finalizada</div>
        </div>
        <div style="position:relative;height:180px;"><canvas id="chartEst" role="img" aria-label="Tareas por estado"></canvas></div>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Distribución por criticidad</div>
      <div style="margin-top:12px;">
        <div class="bar-row"><div class="bar-label">Alta</div><div class="bar-track"><div class="bar-fill" style="width:${pA}%;background:#ef4444;"></div></div><div class="bar-pct">${pA}%</div><div class="bar-count">${alta}</div></div>
        <div class="bar-row"><div class="bar-label">Media</div><div class="bar-track"><div class="bar-fill" style="width:${pM}%;background:#f59e0b;"></div></div><div class="bar-pct">${pM}%</div><div class="bar-count">${media}</div></div>
        <div class="bar-row"><div class="bar-label">Baja</div><div class="bar-track"><div class="bar-fill" style="width:${pB}%;background:#22c55e;"></div></div><div class="bar-pct">${pB}%</div><div class="bar-count">${baja}</div></div>
      </div>
    </div>`;
  if (chartPrio) chartPrio.destroy();
  if (chartEst) chartEst.destroy();
  const estadoLabels = ['Pendiente','En curso','Esperando materiales','Finalizada'];
  chartPrio = new Chart(document.getElementById('chartPrio'), {
    type: 'doughnut',
    data: { labels:['Alta','Media','Baja'], datasets:[{ data:[alta,media,baja], backgroundColor:['#ef4444','#f59e0b','#22c55e'], borderColor:'#161b27', borderWidth:3 }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false } }, cutout:'65%' }
  });
  chartEst = new Chart(document.getElementById('chartEst'), {
    type: 'doughnut',
    data: { labels: estadoLabels, datasets:[{ data: estadoLabels.map(l => tareas.filter(t=>t.estado===l).length), backgroundColor:['#8892a4','#3b82f6','#f59e0b','#22c55e'], borderColor:'#161b27', borderWidth:3 }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false } }, cutout:'65%' }
  });
}

function initFiltros() {
  const plantas = [...new Set(tareas.map(t => t.planta).filter(Boolean))].sort();
  const sel = document.getElementById('filtroPlanta');
  const cur = sel.value;
  sel.innerHTML = '<option value="">Todas las plantas</option>' + plantas.map(p=>`<option${p===cur?' selected':''}>${p}</option>`).join('');
}

function renderTable() {
  const fp = document.getElementById('filtroPlanta').value;
  const fpr = document.getElementById('filtroPrioridad').value;
  const fe = document.getElementById('filtroEstado').value;
  const filtered = tareas.filter(t => (!fp||t.planta===fp) && (!fpr||t.prioridad===fpr) && (!fe||t.estado===fe));
  document.getElementById('tableCount').textContent = filtered.length + ' de ' + tareas.length;
  const bP = p => { const c={Alta:'alta',Media:'media',Baja:'baja'}[p]||''; return `<span class="badge badge-${c}">${p||'—'}</span>`; };
  const bE = e => { const c={'Pendiente':'pendiente','En curso':'encurso','Esperando materiales':'esperando','Finalizada':'finalizada'}[e]||'pendiente'; return `<span class="badge badge-${c}">${e||'—'}</span>`; };
  const tbody = document.getElementById('tbody');
  if (!filtered.length) { tbody.innerHTML = `<tr><td colspan="8"><div class="empty">Sin tareas con ese filtro</div></td></tr>`; return; }
  tbody.innerHTML = filtered.map(t => `<tr>
    <td class="id-cell">#${t.id}</td><td class="date-cell">${t.fecha}</td><td>${t.planta}</td>
    <td>${t.equipo}</td><td class="desc-cell">${t.desc}</td>
    <td>${bP(t.prioridad)}</td><td>${bE(t.estado)}</td><td class="obs-cell">${t.obs}</td>
  </tr>`).join('');
}

function openModal() {
  document.getElementById('fFecha').value = new Date().toISOString().split('T')[0];
  ['fPlanta','fEquipo','fDesc','fObs'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fPrioridad').value = 'Media';
  document.getElementById('fEstado').value = 'Pendiente';
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

async function guardarTarea() {
  const planta = document.getElementById('fPlanta').value.trim();
  const equipo = document.getElementById('fEquipo').value.trim();
  const desc = document.getElementById('fDesc').value.trim();
  if (!planta || !equipo || !desc) { alert('Completá planta, equipo y descripción.'); return; }
  const fecha = document.getElementById('fFecha').value;
  const prioridad = document.getElementById('fPrioridad').value;
  const estado = document.getElementById('fEstado').value;
  const obs = document.getElementById('fObs').value.trim();
  const nextId = tareas.length ? Math.max(...tareas.map(t => parseInt(t.id)||0)) + 1 : 1;
  const fechaFmt = fecha ? new Date(fecha + 'T00:00:00').toLocaleDateString('es-AR') : '';
  const btn = document.getElementById('btnGuardar');
  btn.textContent = 'Guardando...'; btn.disabled = true;
  try {
    await appendRow([nextId, fechaFmt, planta, equipo, desc, prioridad, estado, obs]);
    closeModal();
    await loadData();
  } catch(e) {
    alert('Error al guardar: ' + e.message);
  } finally { btn.textContent = 'Guardar tarea'; btn.disabled = false; }
}

function switchSection(id, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('sec-' + id).classList.add('active');
  el.classList.add('active');
}

loadData();
</script>
</body>
